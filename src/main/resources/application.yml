server:
  port: 8080


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movie_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username:  #数据库username
    password:  #数据库password
    driver-class-name: com.mysql.cj.jdbc.Driver


  sql:
    init:
      mode: always

# MyBatis配置
mybatis:
  # 实体类包路径
  type-aliases-package: com.movie.ticket.entity
  # Mapper XML文件位置（如果没有XML文件可以去掉）
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl